<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Taskboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0e0f11; --surface:#16181c; --surface2:#1e2026; --border:#2a2d35;
  --accent:#7fff6e; --accent-dim:#4db84424; --accent2:#ff8c42;
  --text:#e8eaf0; --muted:#6b7080; --danger:#ff5f57; --done-bg:#1a2018;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

/* LOADING OVERLAY */
#loadingOverlay{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity 0.4s;
}
.loading-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;color:var(--accent);}
.loading-logo span{color:var(--text);}
.loading-spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--muted);}

/* HEADER */
header{
  display:flex;align-items:center;gap:14px;
  padding:13px 26px;border-bottom:1px solid var(--border);
  background:var(--surface);position:sticky;top:0;z-index:100;
  flex-wrap:wrap;
}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-0.03em;color:var(--accent);white-space:nowrap;}
.logo span{color:var(--text);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background 0.3s;}
.sync-dot.synced{background:var(--accent);box-shadow:0 0 6px #7fff6e88;}
.sync-dot.syncing{background:var(--accent2);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.date-badge{font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--muted);background:var(--surface2);padding:4px 10px;border-radius:6px;border:1px solid var(--border);white-space:nowrap;}

/* LEVEL BAR */
.level-bar{flex:1;display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 13px;min-width:0;}
.tag-badge{font-family:'Syne',sans-serif;font-weight:700;font-size:0.74rem;padding:3px 10px;border-radius:99px;white-space:nowrap;flex-shrink:0;}
.level-info{font-family:'DM Mono',monospace;font-size:0.71rem;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.level-info span{color:var(--text);}
.xp-bar-wrap{flex:1;min-width:60px;}
.xp-bar-bg{background:var(--border);border-radius:99px;height:5px;overflow:hidden;}
.xp-bar-fill{height:100%;border-radius:99px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.xp-label{font-family:'DM Mono',monospace;font-size:0.64rem;color:var(--muted);margin-top:3px;text-align:right;}

/* LAYOUT */
.main{display:grid;grid-template-columns:1fr 320px;height:calc(100vh - 67px);overflow:hidden;}
.left-panel{padding:22px 26px;overflow-y:auto;border-right:1px solid var(--border);}
.right-panel{padding:22px 20px;overflow-y:auto;background:var(--surface);}

/* STATUS BAR */
.status-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.status-chip{font-family:'DM Mono',monospace;font-size:0.67rem;padding:3px 10px;border-radius:99px;border:1px solid;display:flex;align-items:center;gap:5px;animation:slideIn 0.2s ease;}
.chip-buff{background:#0d2010;border-color:#7fff6e55;color:var(--accent);}
.chip-debuff{background:#1e0a08;border-color:#ff5f5755;color:var(--danger);}
.chip-neutral{background:var(--surface2);border-color:var(--border);color:var(--muted);}

/* SECTION HEADERS */
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:13px;}
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem;letter-spacing:0.04em;text-transform:uppercase;color:var(--muted);}
.pill{font-family:'DM Mono',monospace;font-size:0.67rem;background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:99px;color:var(--muted);}
.pill.accent{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}

/* DATE NAV */
.date-nav{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.date-nav button{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.date-nav button:hover{border-color:var(--accent);color:var(--accent);}
.date-label{font-family:'Syne',sans-serif;font-weight:700;font-size:1.35rem;flex:1;letter-spacing:-0.03em;}
.date-sub{font-size:0.76rem;color:var(--muted);font-family:'DM Mono',monospace;}

/* METRICS */
.metrics-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.metric-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.metric-label{font-family:'DM Mono',monospace;font-size:0.69rem;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;}
.metric-label span:last-child{color:var(--accent);}
.bar-bg{background:var(--border);border-radius:99px;height:6px;overflow:hidden;margin-top:6px;}
.bar-fill{height:100%;border-radius:99px;transition:width 0.4s cubic-bezier(.4,0,.2,1);}
.progress-fill{background:var(--accent);box-shadow:0 0 10px #7fff6e55;}
.eff-display{display:flex;align-items:baseline;gap:3px;}
.eff-num{font-family:'Syne',sans-serif;font-weight:800;font-size:1.85rem;line-height:1;transition:color 0.3s;}
.eff-pct{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--muted);}

/* ADD TASK */
.add-task-row{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.add-task-row input{flex:1;min-width:120px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.87rem;outline:none;transition:border-color 0.15s;}
.add-task-row input:focus{border-color:var(--accent);}
.add-task-row input::placeholder{color:var(--muted);}
.add-task-row select{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:9px 7px;border-radius:8px;font-family:'DM Mono',monospace;font-size:0.71rem;outline:none;cursor:pointer;}
.btn-add{background:var(--accent);color:#0a0f0a;border:none;padding:9px 15px;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.81rem;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.btn-add:hover{filter:brightness(1.1);transform:translateY(-1px);}

/* TASKS */
.task-list{display:flex;flex-direction:column;gap:6px;}
.task-item{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;transition:all 0.2s;position:relative;overflow:hidden;animation:slideIn 0.2s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.task-item:hover{border-color:#3a3d45;}
.task-item.done{background:var(--done-bg);border-color:#1f2a1d;}
.task-item.done .task-text{text-decoration:line-through;color:var(--muted);}
.task-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:99px;}
.task-item.cat-study::before{background:#6c8fff;}
.task-item.cat-health::before{background:var(--accent);}
.task-item.cat-personal::before{background:#c77dff;}
.task-item.cat-other::before{background:var(--muted);}
.check-btn{width:21px;height:21px;border-radius:6px;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-size:0.71rem;}
.check-btn:hover{border-color:var(--accent);}
.task-item.done .check-btn{background:var(--accent);border-color:var(--accent);color:#0a0f0a;}
.task-text{flex:1;font-size:0.87rem;line-height:1.4;}
.task-cat-badge{font-family:'DM Mono',monospace;font-size:0.61rem;padding:2px 6px;border-radius:99px;opacity:0.7;flex-shrink:0;}
.badge-study{background:#1a2040;color:#6c8fff;}
.badge-health{background:var(--accent-dim);color:var(--accent);}
.badge-personal{background:#1e1030;color:#c77dff;}
.badge-other{background:var(--surface);color:var(--muted);}
.diff-badge{font-family:'DM Mono',monospace;font-size:0.61rem;padding:2px 6px;border-radius:99px;flex-shrink:0;}
.diff-easy{background:#0d2010;color:#7fff6e;}
.diff-medium{background:#2a1800;color:#ff8c42;}
.diff-hard{background:#1e0808;color:#ff5f57;}
.xp-chip{font-family:'DM Mono',monospace;font-size:0.61rem;color:var(--muted);flex-shrink:0;}
.task-item.done .xp-chip{color:var(--accent);}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.87rem;padding:2px 4px;border-radius:4px;opacity:0;transition:all 0.15s;}
.task-item:hover .del-btn{opacity:1;}
.del-btn:hover{color:var(--danger);background:#ff5f5714;}

.empty{text-align:center;padding:34px 20px;color:var(--muted);font-size:0.83rem;}
.empty-icon{font-size:1.7rem;margin-bottom:10px;}
.done-toggle{display:flex;align-items:center;gap:8px;margin:16px 0 10px;cursor:pointer;color:var(--muted);font-size:0.77rem;user-select:none;}
.done-toggle:hover{color:var(--text);}

/* XP TOAST */
.xp-toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--accent);color:var(--accent);font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem;padding:10px 22px;border-radius:99px;box-shadow:0 0 20px #7fff6e33;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap;}
.xp-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* RIGHT PANEL */
.rp-section{margin-bottom:20px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.stat-num{font-family:'Syne',sans-serif;font-weight:800;font-size:1.45rem;color:var(--accent);line-height:1;margin-bottom:4px;}
.stat-num.orange{color:var(--accent2);}
.stat-num.blue{color:#6c8fff;}
.stat-num.purple{color:#c77dff;}
.stat-label{font-size:0.67rem;color:var(--muted);font-family:'DM Mono',monospace;}
.cat-stats{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.cat-stat-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 11px;}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cat-stat-name{flex:1;font-size:0.79rem;}
.cat-stat-num{font-family:'DM Mono',monospace;font-size:0.73rem;color:var(--muted);}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}

/* MONTH SELECT */
.month-select-wrap{margin-bottom:13px;position:relative;}
.month-select-wrap select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 32px 9px 12px;border-radius:8px;font-family:'DM Mono',monospace;font-size:0.82rem;outline:none;cursor:pointer;transition:border-color 0.15s;appearance:none;-webkit-appearance:none;}
.month-select-wrap select:focus{border-color:var(--accent2);}
.month-select-wrap::after{content:'▾';position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}

/* GOALS */
.goal-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:7px;animation:slideIn 0.2s ease;transition:all 0.2s;}
.goal-item:hover{border-color:#3a3d45;}
.goal-item.done-goal .goal-text{text-decoration:line-through;color:var(--muted);}
.goal-row{display:flex;align-items:center;gap:9px;}
.goal-check{width:19px;height:19px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.61rem;transition:all 0.15s;}
.goal-check:hover{border-color:var(--accent2);}
.goal-item.done-goal .goal-check{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.goal-text{flex:1;font-size:0.84rem;}
.goal-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.82rem;opacity:0;transition:all 0.15s;border-radius:4px;padding:2px 4px;}
.goal-item:hover .goal-del{opacity:1;}
.goal-del:hover{color:var(--danger);background:#ff5f5714;}
.add-goal-row{display:flex;gap:6px;margin-top:4px;}
.add-goal-row input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.82rem;outline:none;transition:border-color 0.15s;}
.add-goal-row input:focus{border-color:var(--accent2);}
.add-goal-row input::placeholder{color:var(--muted);}
.btn-goal{background:var(--accent2);color:#fff;border:none;padding:8px 12px;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.77rem;cursor:pointer;transition:all 0.15s;}
.btn-goal:hover{filter:brightness(1.1);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

@media(max-width:720px){
  .main{grid-template-columns:1fr;height:auto;overflow:visible;}
  .left-panel,.right-panel{border:none;height:auto;}
  .right-panel{border-top:1px solid var(--border);}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="loading-logo">task<span>board</span></div>
  <div class="loading-spinner"></div>
  <div class="loading-text">Connecting to cloud…</div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">task<span>board</span></div>
  <div class="sync-dot" id="syncDot" title="Sync status"></div>
  <div class="level-bar">
    <span class="tag-badge" id="tagBadge">—</span>
    <span class="level-info">Lv <span id="lvNum">1</span></span>
    <div class="xp-bar-wrap">
      <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpBarFill" style="width:0%"></div></div>
      <div class="xp-label" id="xpLabel">0 / 100 XP</div>
    </div>
  </div>
  <div class="date-badge" id="headerDate"></div>
</header>

<div class="main">
<!-- LEFT -->
<div class="left-panel">
  <div class="status-bar" id="statusBar"></div>
  <div class="date-nav">
    <button onclick="changeDay(-1)">‹</button>
    <div>
      <div class="date-label" id="dateLabel"></div>
      <div class="date-sub" id="dateSub"></div>
    </div>
    <button onclick="changeDay(1)">›</button>
  </div>
  <div class="metrics-row">
    <div class="metric-card">
      <div class="metric-label"><span>progress</span><span id="progressText">0 / 0</span></div>
      <div class="bar-bg"><div class="bar-fill progress-fill" id="progressBar" style="width:0%"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">efficiency</div>
      <div class="eff-display">
        <span class="eff-num" id="effNum" style="color:var(--muted)">—</span>
        <span class="eff-pct" id="effPctLabel"></span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="effBar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="add-task-row">
    <input type="text" id="taskInput" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask()"/>
    <select id="taskCat">
      <option value="study">📚 Study</option>
      <option value="health">💪 Health</option>
      <option value="personal">🌱 Personal</option>
      <option value="other">• Other</option>
    </select>
    <select id="taskDiff">
      <option value="easy">🟢 Easy</option>
      <option value="medium">🟡 Medium</option>
      <option value="hard">🔴 Hard</option>
    </select>
    <button class="btn-add" onclick="addTask()">+ Add</button>
  </div>
  <div class="section-header">
    <span class="section-title">To-Do</span>
    <span class="pill accent" id="todoCount">0</span>
  </div>
  <div class="task-list" id="todoList"></div>
  <div class="done-toggle" onclick="toggleDoneSection()">
    <span id="doneArrow">▶</span> Completed <span class="pill" id="doneCount">0</span>
  </div>
  <div id="doneSection" style="display:none">
    <div class="task-list" id="doneList"></div>
  </div>
</div>

<!-- RIGHT -->
<div class="right-panel">
  <div class="rp-section">
    <div class="section-header"><span class="section-title">Stats</span></div>
    <div class="stats-grid" style="margin-bottom:10px;">
      <div class="stat-card"><div class="stat-num" id="statStreak">0</div><div class="stat-label">streak 🔥</div></div>
      <div class="stat-card"><div class="stat-num orange" id="statLongest">0</div><div class="stat-label">best streak</div></div>
      <div class="stat-card"><div class="stat-num blue" id="statTotalXP">0</div><div class="stat-label">total XP</div></div>
      <div class="stat-card"><div class="stat-num purple" id="statDays">0</div><div class="stat-label">days tracked</div></div>
    </div>
    <div class="cat-stats">
      <div class="cat-stat-row"><div class="cat-dot" style="background:#6c8fff"></div><span class="cat-stat-name">Study</span><span class="cat-stat-num" id="catStudy">0 tasks</span></div>
      <div class="cat-stat-row"><div class="cat-dot" style="background:var(--accent)"></div><span class="cat-stat-name">Health</span><span class="cat-stat-num" id="catHealth">0 tasks</span></div>
      <div class="cat-stat-row"><div class="cat-dot" style="background:#c77dff"></div><span class="cat-stat-name">Personal</span><span class="cat-stat-num" id="catPersonal">0 tasks</span></div>
      <div class="cat-stat-row"><div class="cat-dot" style="background:var(--muted)"></div><span class="cat-stat-name">Other</span><span class="cat-stat-num" id="catOther">0 tasks</span></div>
    </div>
  </div>
  <hr class="divider"/>
  <div class="rp-section">
    <div class="section-header">
      <span class="section-title">Monthly Goals</span>
      <span class="pill" id="goalDonePill">0/0</span>
    </div>
    <div class="month-select-wrap">
      <select id="monthSelect" onchange="onMonthChange()">
        <option value="2026-04">April 2026</option>
        <option value="2026-05">May 2026</option>
        <option value="2026-06">June 2026</option>
        <option value="2026-07">July 2026</option>
        <option value="2026-08">August 2026</option>
        <option value="2026-09">September 2026</option>
        <option value="2026-10">October 2026</option>
        <option value="2026-11">November 2026</option>
        <option value="2026-12">December 2026</option>
        <option value="2027-01">January 2027</option>
      </select>
    </div>
    <div id="monthGoalList"></div>
    <div class="add-goal-row">
      <input type="text" id="goalInput" placeholder="Add a monthly goal…" onkeydown="if(event.key==='Enter')addGoal()"/>
      <button class="btn-goal" onclick="addGoal()">+ Add</button>
    </div>
  </div>
</div>
</div>

<div class="xp-toast" id="xpToast"></div>

<!-- FIREBASE -->

  { name:'Sovereign',    color:'#ffd54f', bg:'#201800' },
  { name:'Apex',         color:'#e57373', bg:'#200808' },
  { name:'Transcendent', color:'#80cbc4', bg:'#001f1e' },
  { name:'Mythbound',    color:'#ce93d8', bg:'#160020' },
];

function getTagIndex(level) {
  const tiers=[3,6,10,15,21,28,36,45,55,66,78,91,105,120];
  for(let i=0;i<tiers.length;i++) if(level<=tiers[i]) return i;
  return 14;
}
function xpForLevel(n){ return 100+(n-1)*50; }
const XP_VALS={easy:10,medium:25,hard:50};
const STREAK_MULT=s=>s>=30?2.0:s>=15?1.75:s>=8?1.5:s>=4?1.25:1.0;

// ── STATE ─────────────────────────────────────────────────
let currentDateStr = todayStr();
let doneSectionOpen = false;
let selectedMonth = '2026-04';
let cache = {
  tasks: {},      // dateStr -> []
  goals: {},      // monthStr -> []
  xpState: null,
  slump: null,
};
let unsubscribers = [];

function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── SYNC DOT ──────────────────────────────────────────────
function setSyncing(){ document.getElementById('syncDot').className='sync-dot syncing'; }
function setSynced(){  document.getElementById('syncDot').className='sync-dot synced'; }

// ── FIRESTORE HELPERS ────────────────────────────────────
async function fsGet(path){
  const ref=doc(db,...path.split('/'));
  const snap=await getDoc(ref);
  return snap.exists()?snap.data():null;
}
async function fsSet(path, data){
  setSyncing();
  await setDoc(doc(db,...path.split('/')), data, {merge:true});
  setSynced();
}
function fsListen(path, cb){
  const unsub=onSnapshot(doc(db,...path.split('/')), snap=>{
    cb(snap.exists()?snap.data():null);
  });
  unsubscribers.push(unsub);
  return unsub;
}

// ── DATA ACCESSORS ────────────────────────────────────────
function getTasks(ds){ return cache.tasks[ds]||[]; }
async function saveTasks(ds, tasks){
  cache.tasks[ds]=tasks;
  await fsSet(`tasks/${ds}`, {list: tasks});
}
function getMonthGoals(m){ return cache.goals[m]||[]; }
async function saveMonthGoals(m, goals){
  cache.goals[m]=goals;
  await fsSet(`goals/${m}`, {list: goals});
}
function getXPState(){ return cache.xpState||{totalXP:0,level:1,longestStreak:0,catCounts:{study:0,health:0,personal:0,other:0},daysTracked:0}; }
async function saveXPState(st){
  cache.xpState=st;
  await fsSet('meta/xpState', st);
}
function getSlump(){ return cache.slump||{count:0,lastChecked:''}; }
async function saveSlump(s){
  cache.slump=s;
  await fsSet('meta/slump', s);
}

// ── INIT & LISTEN ─────────────────────────────────────────
async function initData(){
  // Load initial data
  const [tasksToday, tasksYest, xpSnap, slumpSnap, goalsSnap] = await Promise.all([
    fsGet(`tasks/${todayStr()}`),
    fsGet(`tasks/${prevDayStr(todayStr())}`),
    fsGet('meta/xpState'),
    fsGet('meta/slump'),
    fsGet(`goals/${selectedMonth}`),
  ]);

  cache.tasks[todayStr()]     = tasksToday?.list||[];
  cache.tasks[prevDayStr(todayStr())] = tasksYest?.list||[];
  cache.xpState  = xpSnap||{totalXP:0,level:1,longestStreak:0,catCounts:{study:0,health:0,personal:0,other:0},daysTracked:0};
  cache.slump    = slumpSnap||{count:0,lastChecked:''};
  cache.goals[selectedMonth] = goalsSnap?.list||[];

  // Real-time listeners
  fsListen(`tasks/${currentDateStr}`, data=>{
    cache.tasks[currentDateStr]=data?.list||[];
    renderAll();
  });
  fsListen('meta/xpState', data=>{
    if(data) cache.xpState=data;
    renderLevelBar(); renderStats();
  });
  fsListen('meta/slump', data=>{
    if(data) cache.slump=data;
    renderStatusBar();
  });
  fsListen(`goals/${selectedMonth}`, data=>{
    cache.goals[selectedMonth]=data?.list||[];
    renderGoals();
  });

  await checkSlump();

  // Hide loading
  const ov=document.getElementById('loadingOverlay');
  ov.style.opacity='0';
  setTimeout(()=>ov.style.display='none',400);

  setSynced();
  renderAll();
}

// ── DATE HELPERS ──────────────────────────────────────────
function prevDayStr(s){
  const p=s.split('-').map(Number),d=new Date(p[0],p[1]-1,p[2]-1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
async function changeDay(delta){
  const p=currentDateStr.split('-').map(Number);
  const d=new Date(p[0],p[1]-1,p[2]+delta);
  currentDateStr=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  // Load tasks for new date if not cached
  if(!cache.tasks[currentDateStr]){
    const snap=await fsGet(`tasks/${currentDateStr}`);
    cache.tasks[currentDateStr]=snap?.list||[];
  }
  // Update listener
  unsubscribers.forEach(u=>u());
  unsubscribers=[];
  fsListen(`tasks/${currentDateStr}`, data=>{
    cache.tasks[currentDateStr]=data?.list||[];
    renderAll();
  });
  fsListen('meta/xpState', data=>{ if(data){cache.xpState=data;} renderLevelBar(); renderStats(); });
  fsListen('meta/slump', data=>{ if(data){cache.slump=data;} renderStatusBar(); });
  fsListen(`goals/${selectedMonth}`, data=>{ cache.goals[selectedMonth]=data?.list||[]; renderGoals(); });

  renderAll();
}
function formatDateLabel(s){
  const p=s.split('-').map(Number),d=new Date(p[0],p[1]-1,p[2]),t=todayStr();
  if(s===t) return 'Today';
  const tp=t.split('-').map(Number);
  const fmt=x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  if(s===fmt(new Date(tp[0],tp[1]-1,tp[2]-1))) return 'Yesterday';
  if(s===fmt(new Date(tp[0],tp[1]-1,tp[2]+1))) return 'Tomorrow';
  return d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short'});
}
function formatDateSub(s){
  const p=s.split('-').map(Number);
  return new Date(p[0],p[1]-1,p[2]).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
}

// ── STREAK ────────────────────────────────────────────────
function calcStreak(){
  let streak=0, d=prevDayStr(todayStr());
  // Use cache for streak calc (only checks cached days)
  for(let i=0;i<365;i++){
    const tasks=cache.tasks[d]||[];
    if(!tasks.length||!tasks.every(t=>t.done)) break;
    streak++;
    d=prevDayStr(d);
  }
  const todayTasks=getTasks(todayStr());
  if(todayTasks.length>0&&todayTasks.every(t=>t.done)) streak++;
  return streak;
}

// ── SLUMP ─────────────────────────────────────────────────
async function checkSlump(){
  const today=todayStr();
  const slump=getSlump();
  if(slump.lastChecked===today) return;

  const yest=prevDayStr(today);
  // Fetch yesterday if not cached
  if(!cache.tasks[yest]){
    const snap=await fsGet(`tasks/${yest}`);
    cache.tasks[yest]=snap?.list||[];
  }
  const yTasks=cache.tasks[yest]||[];
  const yFailed=!yTasks.length||!yTasks.every(t=>t.done);

  if(yFailed){
    slump.count=(slump.lastChecked===yest)?slump.count+1:1;
    const incompleteTasks=yTasks.filter(t=>!t.done);
    if(incompleteTasks.length>0){
      const penalty=Math.round(incompleteTasks.reduce((s,t)=>s+(XP_VALS[t.diff]||10),0)*0.5);
      if(penalty>0){
        const st=getXPState();
        st.totalXP=Math.max(0,st.totalXP-penalty);
        recalcLevel(st);
        await saveXPState(st);
      }
    }
  } else {
    slump.count=0;
  }
  slump.lastChecked=today;
  await saveSlump(slump);
}

// ── XP ────────────────────────────────────────────────────
function recalcLevel(st){
  let lvl=1,remaining=st.totalXP;
  while(true){ const need=xpForLevel(lvl); if(remaining<need) break; remaining-=need; lvl++; }
  st.level=lvl;
}
async function grantXP(task){
  const streak=calcStreak();
  const mult=STREAK_MULT(streak);
  const slump=getSlump();
  const slumpMult=slump.count>=3?0.75:1;
  const base=XP_VALS[task.diff]||10;
  const earned=Math.round(base*mult*slumpMult);
  const st=getXPState();
  st.totalXP+=earned;
  st.catCounts=st.catCounts||{study:0,health:0,personal:0,other:0};
  st.catCounts[task.cat]=(st.catCounts[task.cat]||0)+1;

  const todayTasks=getTasks(todayStr());
  const allDone=todayTasks.every(t=>t.done);
  let bonusXP=0;
  if(allDone){
    const dayBaseXP=todayTasks.reduce((s,t)=>s+(XP_VALS[t.diff]||10),0);
    if(dayBaseXP>75){ bonusXP=Math.round(dayBaseXP*0.20*mult*slumpMult); st.totalXP+=bonusXP; }
    st.daysTracked=(st.daysTracked||0)+1;
    const newStreak=calcStreak();
    if(newStreak>(st.longestStreak||0)) st.longestStreak=newStreak;
  }
  const oldLevel=st.level||1;
  recalcLevel(st);
  await saveXPState(st);
  let msg=`+${earned} XP`;
  if(bonusXP>0) msg+=` +${bonusXP} bonus!`;
  if(st.level>oldLevel) msg=`🎉 Level Up! ${msg}`;
  showToast(msg,st.level>oldLevel);
}
async function revokeXP(task){
  const streak=calcStreak();
  const mult=STREAK_MULT(streak);
  const slump=getSlump();
  const slumpMult=slump.count>=3?0.75:1;
  const base=XP_VALS[task.diff]||10;
  const earned=Math.round(base*mult*slumpMult);
  const st=getXPState();
  st.totalXP=Math.max(0,st.totalXP-earned);
  st.catCounts=st.catCounts||{study:0,health:0,personal:0,other:0};
  st.catCounts[task.cat]=Math.max(0,(st.catCounts[task.cat]||1)-1);
  recalcLevel(st);
  await saveXPState(st);
}

// ── TOAST ─────────────────────────────────────────────────
let toastTimer=null;
function showToast(msg,isLevelUp=false){
  const el=document.getElementById('xpToast');
  el.textContent=msg;
  el.style.borderColor=isLevelUp?'#ffd54f':'var(--accent)';
  el.style.color=isLevelUp?'#ffd54f':'var(--accent)';
  el.style.boxShadow=isLevelUp?'0 0 24px #ffd54f44':'0 0 20px #7fff6e33';
  el.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

// ── MONTH DROPDOWN ────────────────────────────────────────
async function onMonthChange(){
  selectedMonth=document.getElementById('monthSelect').value;
  if(!cache.goals[selectedMonth]){
    const snap=await fsGet(`goals/${selectedMonth}`);
    cache.goals[selectedMonth]=snap?.list||[];
  }
  // Update goal listener
  fsListen(`goals/${selectedMonth}`, data=>{ cache.goals[selectedMonth]=data?.list||[]; renderGoals(); });
  renderGoals();
}
function initMonthDropdown(){
  const cur=todayStr().slice(0,7);
  const sel=document.getElementById('monthSelect');
  const opts=Array.from(sel.options).map(o=>o.value);
  if(opts.includes(cur)){sel.value=cur;selectedMonth=cur;}
  else selectedMonth=sel.value;
}

// ── RENDER ────────────────────────────────────────────────
function renderAll(){
  document.getElementById('headerDate').textContent=new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
  document.getElementById('dateLabel').textContent=formatDateLabel(currentDateStr);
  document.getElementById('dateSub').textContent=formatDateSub(currentDateStr);
  renderTasks(); renderGoals(); renderStats(); renderLevelBar(); renderStatusBar();
}
function effColor(p){ return p>=80?'#7fff6e':p>=50?'#ff8c42':'#ff5f57'; }
function xpBarColor(pct){ return pct>=75?'#7fff6e':pct>=40?'#ff8c42':'#6c8fff'; }

function renderLevelBar(){
  const st=getXPState();
  const lvl=st.level||1;
  const tag=TAGS[getTagIndex(lvl)];
  let spent=0;
  for(let i=1;i<lvl;i++) spent+=xpForLevel(i);
  const xpIn=st.totalXP-spent, xpNeed=xpForLevel(lvl);
  const pct=Math.min(100,Math.round(xpIn/xpNeed*100));
  const col=xpBarColor(pct);
  const tagEl=document.getElementById('tagBadge');
  tagEl.textContent=tag.name;tagEl.style.color=tag.color;tagEl.style.background=tag.bg;tagEl.style.border=`1px solid ${tag.color}44`;
  document.getElementById('lvNum').textContent=lvl;
  document.getElementById('xpBarFill').style.width=pct+'%';
  document.getElementById('xpBarFill').style.background=col;
  document.getElementById('xpBarFill').style.boxShadow=`0 0 8px ${col}66`;
  document.getElementById('xpLabel').textContent=`${xpIn} / ${xpNeed} XP`;
}

function renderStatusBar(){
  const streak=calcStreak();
  const mult=STREAK_MULT(streak);
  const slump=getSlump();
  const chips=[];
  if(mult>1) chips.push(`<div class="status-chip chip-buff">🔥 ${mult}x streak bonus</div>`);
  if(slump.count>=3) chips.push(`<div class="status-chip chip-debuff">⚠️ Slump Day ${slump.count} — 0.75x XP</div>`);
  else if(slump.count>0) chips.push(`<div class="status-chip chip-neutral">🌧️ Slump Day ${slump.count}</div>`);
  if(mult===1&&slump.count===0) chips.push(`<div class="status-chip chip-neutral">✦ No active buffs</div>`);
  document.getElementById('statusBar').innerHTML=chips.join('');
}

function renderTasks(){
  const tasks=getTasks(currentDateStr);
  const todo=tasks.filter(t=>!t.done),done=tasks.filter(t=>t.done);
  const total=tasks.length,doneC=done.length,pct=total?Math.round(doneC/total*100):0;
  document.getElementById('todoCount').textContent=todo.length;
  document.getElementById('doneCount').textContent=doneC;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressText').textContent=`${doneC} / ${total}`;
  const effN=document.getElementById('effNum'),effB=document.getElementById('effBar'),effL=document.getElementById('effPctLabel');
  if(!total){effN.textContent='—';effN.style.color='var(--muted)';effB.style.width='0%';effL.textContent='';}
  else{const col=effColor(pct);effN.textContent=pct;effN.style.color=col;effB.style.width=pct+'%';effB.style.background=col;effB.style.boxShadow=`0 0 8px ${col}55`;effL.textContent='%';}
  document.getElementById('todoList').innerHTML=todo.length?todo.map(taskHTML).join(''):`<div class="empty"><div class="empty-icon">✦</div>No tasks yet — add one above!</div>`;
  document.getElementById('doneList').innerHTML=done.map(taskHTML).join('');
}

function taskHTML(t){
  const badges={study:'badge-study',health:'badge-health',personal:'badge-personal',other:'badge-other'};
  const catL={study:'Study',health:'Health',personal:'Personal',other:'Other'};
  const diffL={easy:'Easy',medium:'Medium',hard:'Hard'};
  const diffB={easy:'diff-easy',medium:'diff-medium',hard:'diff-hard'};
  return `<div class="task-item cat-${t.cat} ${t.done?'done':''}">
    <button class="check-btn" onclick="toggleTask('${t.id}')">${t.done?'✓':''}</button>
    <span class="task-text">${escHtml(t.text)}</span>
    <span class="task-cat-badge ${badges[t.cat]||'badge-other'}">${catL[t.cat]||t.cat}</span>
    <span class="diff-badge ${diffB[t.diff||'easy']}">${diffL[t.diff||'easy']}</span>
    <span class="xp-chip">${XP_VALS[t.diff||'easy']}xp</span>
    <button class="del-btn" onclick="deleteTask('${t.id}')">✕</button>
  </div>`;
}

function renderGoals(){
  const goals=getMonthGoals(selectedMonth);
  const done=goals.filter(g=>g.done).length;
  document.getElementById('goalDonePill').textContent=`${done}/${goals.length}`;
  document.getElementById('monthGoalList').innerHTML=goals.length?goals.map(goalHTML).join(''):`<div class="empty" style="padding:14px 0 10px"><div class="empty-icon" style="font-size:1.3rem">🎯</div>No goals for this month yet</div>`;
}
function goalHTML(g){
  return `<div class="goal-item ${g.done?'done-goal':''}">
    <div class="goal-row">
      <button class="goal-check" onclick="toggleGoal('${g.id}')">${g.done?'✓':''}</button>
      <span class="goal-text">${escHtml(g.text)}</span>
      <button class="goal-del" onclick="deleteGoal('${g.id}')">✕</button>
    </div>
  </div>`;
}
function renderStats(){
  const streak=calcStreak();
  const st=getXPState();
  document.getElementById('statStreak').textContent=streak;
  document.getElementById('statLongest').textContent=Math.max(streak,st.longestStreak||0);
  document.getElementById('statTotalXP').textContent=st.totalXP||0;
  document.getElementById('statDays').textContent=st.daysTracked||0;
  const cc=st.catCounts||{};
  document.getElementById('catStudy').textContent=(cc.study||0)+' tasks';
  document.getElementById('catHealth').textContent=(cc.health||0)+' tasks';
  document.getElementById('catPersonal').textContent=(cc.personal||0)+' tasks';
  document.getElementById('catOther').textContent=(cc.other||0)+' tasks';
}

// ── TASKS CRUD ────────────────────────────────────────────
async function addTask(){
  const inp=document.getElementById('taskInput');
  const text=inp.value.trim(); if(!text) return;
  const tasks=getTasks(currentDateStr);
  tasks.push({id:uid(),text,cat:document.getElementById('taskCat').value,diff:document.getElementById('taskDiff').value,done:false});
  inp.value='';
  await saveTasks(currentDateStr,tasks);
}
async function toggleTask(id){
  const tasks=getTasks(currentDateStr);
  const t=tasks.find(t=>t.id===id); if(!t) return;
  t.done=!t.done;
  await saveTasks(currentDateStr,tasks);
  if(t.done&&currentDateStr===todayStr()) await grantXP(t);
  else if(!t.done&&currentDateStr===todayStr()) await revokeXP(t);
}
async function deleteTask(id){
  await saveTasks(currentDateStr,getTasks(currentDateStr).filter(t=>t.id!==id));
}

// ── GOALS CRUD ────────────────────────────────────────────
async function addGoal(){
  const inp=document.getElementById('goalInput');
  const text=inp.value.trim(); if(!text) return;
  const goals=getMonthGoals(selectedMonth);
  goals.push({id:uid(),text,done:false});
  inp.value='';
  await saveMonthGoals(selectedMonth,goals);
}
async function toggleGoal(id){
  const goals=getMonthGoals(selectedMonth);
  const g=goals.find(g=>g.id===id); if(g) g.done=!g.done;
  await saveMonthGoals(selectedMonth,goals);
}
async function deleteGoal(id){
  await saveMonthGoals(selectedMonth,getMonthGoals(selectedMonth).filter(g=>g.id!==id));
}

// ── UI ────────────────────────────────────────────────────
function toggleDoneSection(){
  doneSectionOpen=!doneSectionOpen;
  document.getElementById('doneSection').style.display=doneSectionOpen?'block':'none';
  document.getElementById('doneArrow').textContent=doneSectionOpen?'▼':'▶';
}
function uid(){ return Math.random().toString(36).slice(2,10); }
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Expose to global for onclick handlers
window.changeDay=changeDay; window.addTask=addTask; window.toggleTask=toggleTask;
window.deleteTask=deleteTask; window.addGoal=addGoal; window.toggleGoal=toggleGoal;
window.deleteGoal=deleteGoal; window.toggleDoneSection=toggleDoneSection;
window.onMonthChange=onMonthChange;

// ── INIT ──────────────────────────────────────────────────
initMonthDropdown();
initData();
</script>
